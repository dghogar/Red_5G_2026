openapi: 3.0.0
info:
  contact:
    url: https://forge.etsi.org/rep/mec/gs011-app-enablement-api
  description: |
    The present document focuses on the functionalities enabled via the Mp1 reference point between MEC applications and MEC platform, which allows these applications to interact with the MEC system. Service management functionality includes registration/deregistration, discovery and event notifications. Application support functionality includes application start-up, registration and termination, traffic rules, DNS and time of day. It describes the information flows, required information, and specifies the necessary operations, data models and API definitions.
  license:
    name: BSD-3-Clause
    url: https://forge.etsi.org/legal-matters
  title: ETSI GS MEC 011 Edge Platform Application Enablement
  version: 3.1.1
servers:
- url: https://localhost:8081/mec_app_support/v1
paths:
  /applications/{appInstanceId}/confirm_ready:
    post:
      description: "The POST method may be used by the MEC application instance to\
        \ notify the MEC platform that it is up and running. POST HTTP method shall\
        \ support the URI query parameters, request and response data structures,\
        \ and response codes, as specified in tables 7.2.12.3.4-1 and 7.2.12.3.4-2."
      operationId: applications_confirmready_post_appinstanceid
      parameters:
      - description: The unique identifier of the appInstanceId.
        explode: false
        in: path
        name: appInstanceId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationsConfirmreadyPOSTAppinstanceid_request"
        description: Message content in the request contains the indication that the
          application instance is up and running.
        required: true
      responses:
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "429":
          $ref: "#/components/responses/429"
      summary: Confirm the application instance is up and running.
      tags:
      - applicationSupport
      x-openapi-router-controller: openapi_server.controllers.application_support_controller
  /applications/{appInstanceId}/confirm_termination:
    post:
      description: "Table 7.2.11.3.4-1: URI query parameters supported by the POST\
        \ method on this resource"
      operationId: applications_confirmtermination_post_appinstanceid
      parameters:
      - description: The unique identifier of the appInstanceId.
        explode: false
        in: path
        name: appInstanceId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationsConfirmterminationPOSTAppinstanceid_request"
        description: Message content in the request contains the operational action
          the application instance is responding to.
        required: true
      responses:
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "429":
          $ref: "#/components/responses/429"
      summary: Confirm the application level termination of an App instance.
      tags:
      - applicationSupport
      x-openapi-router-controller: openapi_server.controllers.application_support_controller
  /applications/{appInstanceId}/dns_rules:
    get:
      description: This method retrieves information about all the DNS rules associated
        with a MEC application instance.
      operationId: applications_dnsrules_get_appinstanceid
      parameters:
      - description: The unique identifier of the appInstanceId.
        explode: false
        in: path
        name: appInstanceId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/DnsRule"
                type: array
          description: "Upon success, a response message content containing an array\
            \ of the DnsRules is returned."
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
      summary: Retrieve information about a list of mecDnsRule resources for an application
        instance.
      tags:
      - applicationSupport
      x-openapi-router-controller: openapi_server.controllers.application_support_controller
  /applications/{appInstanceId}/dns_rules/{dnsRuleId}:
    get:
      description: 'This method retrieves information about a DNS rule associated
        with a MEC application instance. '
      operationId: applications_dnsrules_get_appinstanceid_dnsruleid
      parameters:
      - description: The unique identifier of the appInstanceId.
        explode: false
        in: path
        name: appInstanceId
        required: true
        schema:
          type: string
        style: simple
      - description: The unique identifier of the dnsRuleId.
        explode: false
        in: path
        name: dnsRuleId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationsDnsrulesGETAppinstanceidDnsruleid_200_response"
          description: "Upon success, a response message content containing the DnsRules\
            \ is returned."
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
      summary: Retrieve information about a mecDnsRule resource.
      tags:
      - applicationSupport
      x-openapi-router-controller: openapi_server.controllers.application_support_controller
    put:
      description: "PUT HTTP method shall comply with the URI query parameters, request\
        \ and response data structures, and response codes, as specified in tables\
        \ 7.2.10.3.2-1 and 7.2.10.3.2-2."
      operationId: applications_dnsrules_put_appinstanceid_dnsruleid
      parameters:
      - description: The unique identifier of the appInstanceId.
        explode: false
        in: path
        name: appInstanceId
        required: true
        schema:
          type: string
        style: simple
      - description: The unique identifier of the dnsRuleId.
        explode: false
        in: path
        name: dnsRuleId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationsDnsrulesGETAppinstanceidDnsruleid_200_response"
        description: The updated "state" is included in the message content of the
          request.
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationsDnsrulesGETAppinstanceidDnsruleid_200_response"
          description: "Upon success, a response message content containing data type\
            \ describing the updated DnsRule is returned."
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "412":
          $ref: "#/components/responses/412"
      summary: Update the information about a mecDnsRule resource.
      tags:
      - applicationSupport
      x-openapi-router-controller: openapi_server.controllers.application_support_controller
  /applications/{appInstanceId}/subscriptions:
    get:
      description: "The GET method may be used to request information about all subscriptions\
        \ for this requestor. Upon success, the response contains message content\
        \ with all the subscriptions for the requestor."
      operationId: applications_subscriptions_get_appinstanceid
      parameters:
      - description: The unique identifier of the appInstanceId.
        explode: false
        in: path
        name: appInstanceId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationsSubscriptionsGETAppinstanceid_200_response"
          description: "Upon success, a response message content containing the list\
            \ of links to the requested subscriptions is returned."
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
      summary: Retrieve information about a list of mecAppSupportSubscription resources
        for this subscriber.
      tags:
      - applicationSupport
      x-openapi-router-controller: openapi_server.controllers.application_support_controller
    post:
      callbacks:
        notification:
          '{$request.body#/callbackUri}':
            post:
              description: Subscription notification
              operationId: notificationPOST637029
              requestBody:
                content:
                  application/json:
                    schema:
                      $ref: "#/components/schemas/notificationPOST637029_request"
                description: Subscription notification
                required: true
              responses:
                "204":
                  description: No content
                "404":
                  description: Not found
              summary: Callback POST used to send a notification
              x-callback-request: true
      description: "The POST method may be used to create a new subscription. One\
        \ example use case is to create a new subscription to the MEC application\
        \ termination notifications. Upon success, the response contains message content\
        \ describing the created subscription. "
      operationId: applications_subscriptions_post_appinstanceid
      parameters:
      - description: The unique identifier of the appInstanceId.
        explode: false
        in: path
        name: appInstanceId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationsSubscriptionsPOSTAppinstanceid_request"
        description: Message content in the request contains a subscription to the
          MEC application termination notifications that is to be created.
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationsSubscriptionsPOSTAppinstanceid_request"
          description: "Upon success, the HTTP response shall include a \"Location\"\
            \ HTTP header that contains the resource URI of the created subscription\
            \ resource."
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
      summary: Create a mecAppSupportSubscription resource.
      tags:
      - applicationSupport
      x-openapi-router-controller: openapi_server.controllers.application_support_controller
  /applications/{appInstanceId}/subscriptions/{subscriptionId}:
    delete:
      description: This method deletes a mecAppSupportSubscription. This method is
        typically used in "Unsubscribing from event notifications" procedure as described
        in clause 5.2.6.3. Figure 7.2.4.3.5-1 shows the example message flows using
        DELETE method.
      operationId: applications_subscriptions_delete_appinstanceid_subscriptionid
      parameters:
      - description: The unique identifier of the appInstanceId.
        explode: false
        in: path
        name: appInstanceId
        required: true
        schema:
          type: string
        style: simple
      - description: The unique identifier of the subscriptionId.
        explode: false
        in: path
        name: subscriptionId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          $ref: "#/components/responses/204"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
      summary: Delete a mecAppSupportSubscription resource.
      tags:
      - applicationSupport
      x-openapi-router-controller: openapi_server.controllers.application_support_controller
    get:
      description: "The GET method requests information about a subscription for this\
        \ requestor. Upon success, the response contains message content with the\
        \ subscription for the requestor."
      operationId: applications_subscriptions_get_appinstanceid_subscriptionid
      parameters:
      - description: The unique identifier of the appInstanceId.
        explode: false
        in: path
        name: appInstanceId
        required: true
        schema:
          type: string
        style: simple
      - description: The unique identifier of the subscriptionId.
        explode: false
        in: path
        name: subscriptionId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationsSubscriptionsPOSTAppinstanceid_request"
          description: "Upon success, a response message content containing the requested\
            \ subscription is returned."
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
      summary: Retrieve information about a mecAppSupportSubscription resource for
        this subscriber.
      tags:
      - applicationSupport
      x-openapi-router-controller: openapi_server.controllers.application_support_controller
  /applications/{appInstanceId}/traffic_rules:
    get:
      description: This method retrieves information about all the traffic rules associated
        with a MEC application instance.
      operationId: applications_trafficrules_get_appinstanceid
      parameters:
      - description: The unique identifier of the appInstanceId.
        explode: false
        in: path
        name: appInstanceId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/TrafficRule"
                type: array
          description: "Upon success, a response message content containing an array\
            \ of the TrafficRules is returned."
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
      summary: Retrieve information about a list of mecTrafficRule resources for an
        application instance.
      tags:
      - applicationSupport
      x-openapi-router-controller: openapi_server.controllers.application_support_controller
  /applications/{appInstanceId}/traffic_rules/{trafficRuleId}:
    get:
      description: This method retrieves information about a traffic rule associated
        with a MEC application instance.
      operationId: applications_trafficrules_get_appinstanceid_trafficruleid
      parameters:
      - description: The unique identifier of the appInstanceId.
        explode: false
        in: path
        name: appInstanceId
        required: true
        schema:
          type: string
        style: simple
      - description: The unique identifier of the trafficRuleId.
        explode: false
        in: path
        name: trafficRuleId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationsTrafficrulesGETAppinstanceidTrafficruleid_200_response"
          description: "Upon success, a response message content containing the TrafficRules\
            \ is returned."
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
      summary: Retrieve information about a mecTrafficRule resource.
      tags:
      - applicationSupport
      x-openapi-router-controller: openapi_server.controllers.application_support_controller
    put:
      description: "PUT HTTP method shall comply with the URI query parameters, request\
        \ and response data structures, and response codes, as specified in tables\
        \ 7.2.8.3.2-1 and 7.2.8.3.2-2."
      operationId: applications_trafficrules_put_appinstanceid_trafficruleid
      parameters:
      - description: The unique identifier of the appInstanceId.
        explode: false
        in: path
        name: appInstanceId
        required: true
        schema:
          type: string
        style: simple
      - description: The unique identifier of the trafficRuleId.
        explode: false
        in: path
        name: trafficRuleId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationsTrafficrulesGETAppinstanceidTrafficruleid_200_response"
        description: One or more updated attributes that are allowed to be changed
          (i.e. "state" or other attributes based on definition in clause 7.1.2.2)
          are included in the TrafficRule data structure in the message content of
          the request.
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationsTrafficrulesGETAppinstanceidTrafficruleid_200_response"
          description: "Upon success, a response message content containing data type\
            \ describing the updated TrafficRule is returned."
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "412":
          $ref: "#/components/responses/412"
      summary: Update the information about a mecTrafficRule resource.
      tags:
      - applicationSupport
      x-openapi-router-controller: openapi_server.controllers.application_support_controller
  /registrations:
    get:
      tags:
      - registrations
      summary: "Obtener todas las apps registradas (TFG Idea 1)"
      operationId: registrations_get
      responses:
        "200":
          description: OK
      x-openapi-router-controller: openapi_server.controllers.application_support_controller
    post:
      description: "The POST method may be used by the MEC application instance to\
        \ request its registration to the MEC platform. Upon success, the response\
        \ contains message content describing the created registration. "
      operationId: registrations_post
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationsPOST_request"
        description: "The message content in the request contains the profile of the\
          \ MEC application instance, calling the MEC platform to register the MEC\
          \ application instance. ."
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationsPOST_request"
          description: Indicates successful resource creation for registration of
            the MEC application instance to the MEC platform. The resource URI shall
            be returned in the HTTP Location header field.
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
      summary: Register the MEC application instance to the MEC platform.
      tags:
      - applicationSupport
      x-openapi-router-controller: openapi_server.controllers.application_support_controller
  /registrations/{appInstanceId}:
    delete:
      description: "The DELETE method is used to cancel the existing MEC application\
        \ instance registration. Cancellation can be made by deleting the resource\
        \ that represents the existing MEC application instance registration. DELETE\
        \ HTTP method shall comply with the URI query parameters, request and response\
        \ data structures, and response codes, as specified in tables\_7.2.14.3.5-1\
        \ and 7.2.14.3.5-2."
      operationId: registrations_delete_appinstanceid
      parameters:
      - description: The unique identifier of the appInstanceId.
        explode: false
        in: path
        name: appInstanceId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          $ref: "#/components/responses/204"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
      summary: Request deregistration of the application instance from the MEC platform.
      tags:
      - applicationSupport
      x-openapi-router-controller: openapi_server.controllers.application_support_controller
    get:
      description: "The GET method may be used by the MEC application instance to\
        \ retrieve information about the existing MEC application instance registration\
        \ to the MEC platform. GET HTTP method shall comply with the URI query parameters,\
        \ request and response data structures, and response codes, as specified in\
        \ tables 7.2.14.3.1-1 and 7.2.14.3.1-2."
      operationId: registrations_get_appinstanceid
      parameters:
      - description: The unique identifier of the appInstanceId.
        explode: false
        in: path
        name: appInstanceId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationsPOST_request"
          description: "Upon success, a response message content containing the AppInfo\
            \ is returned."
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
      summary: Retrieve information about the MEC application instance registration
        to the MEC platform.
      tags:
      - applicationSupport
      x-openapi-router-controller: openapi_server.controllers.application_support_controller
    put:
      description: "The PUT method may be used by the MEC application instance to\
        \ update its registration to the MEC platform. PUT HTTP method shall comply\
        \ with the URI query parameters, request and response data structures, and\
        \ response codes, as specified in tables 7.2.14.3.2-1 and 7.2.14.3.2-2."
      operationId: registrations_put_appinstanceid
      parameters:
      - description: The unique identifier of the appInstanceId.
        explode: false
        in: path
        name: appInstanceId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationsPOST_request"
        description: "Message content in the request contains the profile of the application,\
          \ calling the MEC platform to update the existing MEC application instance\
          \ registration."
        required: true
      responses:
        "204":
          content:
            application/json:
              schema:
                properties: {}
                type: object
          description: "Upon success, a response 204 No Content without any response\
            \ message content is returned."
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
      summary: Update the existing registration of that MEC application instance to
        the MEC platform.
      tags:
      - applicationSupport
      x-openapi-router-controller: openapi_server.controllers.application_support_controller
  /timing/current_time:
    get:
      description: This method retrieves the information of the platform's current
        time which corresponds to the get platform time procedure as described in
        clause 5.2.10.2. Figure 7.2.6.3.1-1 shows message flow for retrieving current
        time using GET method.
      operationId: timing_currenttime_get
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimingCurrenttimeGET_200_response"
          description: It is used to indicate nonspecific success. The response message
            content contains a representation of the resource.
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
      summary: Retrieve information about the mecCurrentTime resource.
      tags:
      - applicationSupport
      x-openapi-router-controller: openapi_server.controllers.application_support_controller
  /timing/timing_caps:
    get:
      description: This method retrieves the information of the platform's timing
        capabilities which corresponds to the timing capabilities query as described
        in clause 5.2.10.3. Figure 7.2.5.3.1-1 shows the example message flow for
        retrieving timing capabilities using GET method.
      operationId: timing_timingcaps_get
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimingTimingcapsGET_200_response"
          description: It is used to indicate nonspecific success. The response message
            content contains a representation of the resource.
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
      summary: Retrieve information about the mecTimingCaps resource.
      tags:
      - applicationSupport
      x-openapi-router-controller: openapi_server.controllers.application_support_controller
components:
  parameters: {}
  responses:
    "200":
      description: OK
    "204":
      description: No Content
    "400":
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
      description: "Bad Request: used to indicate that incorrect parameters were passed\
        \ to the request."
    "401":
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
      description: "Unauthorized: used when the client did not submit credentials."
    "403":
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
      description: "Forbidden: operation is not allowed given the current status of\
        \ the resource."
    "404":
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
      description: "Not Found: used when a client provided a URI that cannot be mapped\
        \ to a valid resource URI."
    "409":
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
      description: "Conflict: The operation cannot be executed currently, due to a\
        \ conflict with the state of the resource. ."
    "412":
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
      description: "Precondition failed: used when a condition has failed during conditional\
        \ requests, e.g. when using ETags to avoid write conflicts when using PUT"
    "414":
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
      description: "URI Too Long: used to indicate that the server is refusing to\
        \ process the request because the request URI is longer than the server is\
        \ willing or able to process."
    "429":
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
