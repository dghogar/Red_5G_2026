openapi: 3.0.0
info:
  contact:
    url: https://forge.etsi.org/rep/mec/gs012-rnis-api
  description: The ETSI MEC ISG Radio Network Information API described using OpenAPI.
  license:
    name: BSD-3-Clause
    url: https://forge.etsi.org/legal-matters
  title: ETSI GS MEC 012 Radio Network Information API
  version: 2.2.1
servers:
- url: https://localhost/rni/v2
paths:
  /queries/layer2_meas:
    get:
      description: The GET method is used to query information about the layer 2 measurements.
      operationId: queries_layer2_meas_get
      parameters:
      - $ref: "#/components/parameters/Query.App_ins_id"
      - $ref: "#/components/parameters/Query.Cell_id1"
      - $ref: "#/components/parameters/Query.Ue_ipv4_address"
      - $ref: "#/components/parameters/Query.Ue_ipv6_address"
      - $ref: "#/components/parameters/Query.Nated_ip_address"
      - $ref: "#/components/parameters/Query.Gtp_teid"
      - $ref: "#/components/parameters/Query.Dl_gbr_prb_usage_cell"
      - $ref: "#/components/parameters/Query.Ul_gbr_prb_usage_cell"
      - $ref: "#/components/parameters/Query.Dl_nongbr_prb_usage_cell"
      - $ref: "#/components/parameters/Query.Ul_nongbr_prb_usage_cell"
      - $ref: "#/components/parameters/Query.Dl_total_prb_usage_cell"
      - $ref: "#/components/parameters/Query.Ul_total_prb_usage_cell"
      - $ref: "#/components/parameters/Query.Received_dedicated_preambles_cell"
      - $ref: "#/components/parameters/Query.Received_randomly_selecte_preambles_low_range_cell"
      - $ref: "#/components/parameters/Query.Received_randomly_selected_preambles_high_range_cell"
      - $ref: "#/components/parameters/Query.Number_of_active_ue_dl_gbr_cell"
      - $ref: "#/components/parameters/Query.Number_of_active_ue_ul_gbr_cell"
      - $ref: "#/components/parameters/Query.Number_of_active_ue_dl_nongbr_cell"
      - $ref: "#/components/parameters/Query.Number_of_active_ue_ul_nongbr_cell"
      - $ref: "#/components/parameters/Query.Dl_gbr_pdr_cell"
      - $ref: "#/components/parameters/Query.Ul_gbr_pdr_cell"
      - $ref: "#/components/parameters/Query.Dl_nongbr_pdr_cell"
      - $ref: "#/components/parameters/Query.Ul_nongbr_pdr_cell"
      - $ref: "#/components/parameters/Query.Dl_gbr_delay_ue"
      - $ref: "#/components/parameters/Query.Ul_gbr_delay_ue"
      - $ref: "#/components/parameters/Query.Dl_nongbr_delay_ue"
      - $ref: "#/components/parameters/Query.Ul_nongbr_delay_ue"
      - $ref: "#/components/parameters/Query.Dl_gbr_pdr_ue"
      - $ref: "#/components/parameters/Query.Ul_gbr_pdr_ue"
      - $ref: "#/components/parameters/Query.Dl_nongbr_pdr_ue"
      - $ref: "#/components/parameters/Query.Ul_nongbr_pdr_ue"
      - $ref: "#/components/parameters/Query.Dl_gbr_throughput_ue"
      - $ref: "#/components/parameters/Query.Ul_gbr_throughput_ue"
      - $ref: "#/components/parameters/Query.Dl_nongbr_throughput_ue"
      - $ref: "#/components/parameters/Query.Ul_nongbr_throughput_ue"
      - $ref: "#/components/parameters/Query.Dl_gbr_data_volume_ue"
      - $ref: "#/components/parameters/Query.Ul_gbr_data_volume_ue"
      - $ref: "#/components/parameters/Query.Dl_nongbr_data_volume_ue"
      - $ref: "#/components/parameters/Query.Ul_nongbr_data_volume_ue"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueriesLayer2MeasGET_200_response"
          description: "Upon success, a response body containing the layer 2 measurements\
            \ information is returned."
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "406":
          $ref: "#/components/responses/406"
        "414":
          $ref: "#/components/responses/414"
        "429":
          $ref: "#/components/responses/429"
      summary: Retrieve current status of layer 2 measurements information.
      tags:
      - queries
      x-openapi-router-controller: openapi_server.controllers.queries_controller
  /queries/plmn_info:
    get:
      description: The GET method is used to query information about the Mobile Network.
      operationId: queries_plmninfo_get
      parameters:
      - $ref: "#/components/parameters/Query.App_ins_id1"
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/PlmnInfo"
                type: array
          description: "Upon success, a response body containing the array of Mobile\
            \ Network information is returned."
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "406":
          $ref: "#/components/responses/406"
        "429":
          $ref: "#/components/responses/429"
      summary: Retrieve current status of PLMN information.
      tags:
      - queries
      x-openapi-router-controller: openapi_server.controllers.queries_controller
  /queries/rab_info:
    get:
      description: The GET method is used to query information about the Radio Access
        Bearers.
      operationId: queries_rabinfo_get
      parameters:
      - $ref: "#/components/parameters/Query.App_ins_id"
      - $ref: "#/components/parameters/Query.Cell_id"
      - $ref: "#/components/parameters/Query.Ue_ipv4_address"
      - $ref: "#/components/parameters/Query.Ue_ipv6_address"
      - $ref: "#/components/parameters/Query.Nated_ip_address"
      - $ref: "#/components/parameters/Query.Gtp_teid"
      - $ref: "#/components/parameters/Query.Erab_id"
      - $ref: "#/components/parameters/Query.Qci"
      - $ref: "#/components/parameters/Query.Erab_mbr_dl"
      - $ref: "#/components/parameters/Query.Erab_mbr_ul"
      - $ref: "#/components/parameters/Query.Erab_gbr_dl"
      - $ref: "#/components/parameters/Query.Erab_gbr_ul"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueriesRabinfoGET_200_response"
          description: "Upon success, a response body containing the Radio Access\
            \ Bearer information is returned."
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "406":
          $ref: "#/components/responses/406"
        "429":
          $ref: "#/components/responses/429"
      summary: Retrieve current status of Radio Access Bearer information .
      tags:
      - queries
      x-openapi-router-controller: openapi_server.controllers.queries_controller
  /queries/s1_bearer_info:
    get:
      description: The GET method is used to query information about the S1 bearer(s).
      operationId: queries_s1_bearerinfo_get
      parameters:
      - $ref: "#/components/parameters/Query.Temp_ue_id"
      - $ref: "#/components/parameters/Query.Ue_ipv4_address"
      - $ref: "#/components/parameters/Query.Ue_ipv6_address"
      - $ref: "#/components/parameters/Query.Nated_ip_address"
      - $ref: "#/components/parameters/Query.Gtp_teid"
      - $ref: "#/components/parameters/Query.Cell_id"
      - $ref: "#/components/parameters/Query.Erab_id1"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueriesS1BearerinfoGET_200_response"
          description: "Upon success, a response body containing the UE S1-U bearer\
            \ information is returned."
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "406":
          $ref: "#/components/responses/406"
        "429":
          $ref: "#/components/responses/429"
      summary: Retrieve current status of S1 bearer information.
      tags:
      - queries
      x-openapi-router-controller: openapi_server.controllers.queries_controller
  /subscriptions:
    get:
      description: "The GET method is used to request information about the subscriptions\
        \ for this requestor. Upon success, the response contains entity body with\
        \ the list of links to the subscriptions that are present for the requestor."
      operationId: subscriptions_get
      parameters:
      - $ref: "#/components/parameters/Query.Subscription_type"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionsGET_200_response"
          description: "Upon success, a response body containing the list of links\
            \ to requestor's subscriptions is returned."
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "406":
          $ref: "#/components/responses/406"
        "429":
          $ref: "#/components/responses/429"
      summary: Retrieve a list of active subscriptions for this subscriber.
      tags:
      - subscriptions
      x-openapi-router-controller: openapi_server.controllers.subscriptions_controller
    post:
      callbacks:
        notification:
          '{$request.body#/callbackUri}':
            post:
              description: Subscription notification
              operationId: notificationPOST
              requestBody:
                content:
                  application/json:
                    schema:
                      $ref: "#/components/schemas/notificationPOST_request"
                description: Subscription notification
                required: true
              responses:
                "204":
                  description: No content
                "404":
                  description: Not found
              summary: Callback POST used to send a notification
              x-callback-request: true
      description: "The POST method is used to create a new subscription to Radio\
        \ Network Information notifications. Upon success, the response contains entity\
        \ body describing the created subscription."
      operationId: subscriptions_post
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionsPOST_request"
        description: |-
          The entity body in the request contains data type of the specific RNI event subscription that is to be created, where the data type options are listed below and defined in clauses 6.3.2 through 6.3.9 and in clause 6.3.11:
          CellChangeSubscription
          RabEstSubscription
          RabModSubscription
          RabRelSubscription
          MeasRepUeSubscription
          NrMeasRepUeSubscription
          MeasTaSubscription
          CaReconfSubscription
          S1BearerSubscription.
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionsPOST_request"
          description: |-
            Indicates successful resource creation, where the resource URI shall be returned in the HTTP Location header field.

            In the returned NotificationSubscription structure, the created subscription is described using the appropriate data type from the list below and as defined in clauses 6.3.2 through 6.3.9 and in clause 6.3.11:
            CellChangeSubscription
            RabEstSubscription
            RabModSubscription
            RabRelSubscription
            MeasRepUeSubscription
            NrMeasRepUeSubscription
            MeasTaSubscription
            CaReconfSubscription
            S1BearerSubscription.
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "406":
          $ref: "#/components/responses/406"
        "415":
          $ref: "#/components/responses/415"
        "422":
          $ref: "#/components/responses/422"
        "429":
          $ref: "#/components/responses/429"
      summary: Create a new subscription.
      tags:
      - subscriptions
      x-openapi-router-controller: openapi_server.controllers.subscriptions_controller
  /subscriptions/{subscriptionId}:
    delete:
      description: The DELETE method is used to cancel the existing subscription.
        Cancellation can be made by deleting the resource that represents existing
        subscription.
      operationId: subscriptions_delete_subscriptionid
      parameters:
      - description: The unique identifier of the subscriptionId.
        explode: false
        in: path
        name: subscriptionId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          $ref: "#/components/responses/204"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "429":
          $ref: "#/components/responses/429"
      summary: Cancel the existing subscription.
      tags:
      - subscriptions
      x-openapi-router-controller: openapi_server.controllers.subscriptions_controller
    get:
      description: "The GET method is used to retrieve information about this subscription.\
        \ Upon success, the response contains entity body with the data type describing\
        \ the subscription."
      operationId: subscriptions_get_subscriptionid
      parameters:
      - description: The unique identifier of the subscriptionId.
        explode: false
        in: path
        name: subscriptionId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionsPOST_request"
          description: |-
            Upon success, a response body containing data type describing the specific RNI event subscription is returned. The allowed data types for subscriptions are defined in clauses 6.3.2 through 6.3.9 and in clause 6.3.11 and are as follows:
            CellChangeSubscription
            RabEstSubscription
            RabModSubscription
            RabRelSubscription
            MeasRepUeSubscription
            NrMeasRepUeSubscription
            MeasTaSubscription
            CaReconfSubscription
            S1BearerSubscription.
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "406":
          $ref: "#/components/responses/406"
        "429":
          $ref: "#/components/responses/429"
      summary: Retrieve information on current specific subscription.
      tags:
      - subscriptions
      x-openapi-router-controller: openapi_server.controllers.subscriptions_controller
    put:
      description: "The PUT method is used to update the existing subscription. PUT\
        \ method in this case has \"replace\" semantics. Upon successful operation,\
        \ the target resource is updated with new Data Type received within the message\
        \ body of the PUT request. "
      operationId: subscriptions_put_subscriptionid
      parameters:
      - description: The unique identifier of the subscriptionId.
        explode: false
        in: path
        name: subscriptionId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionsPOST_request"
        description: |-
          New NotificationSubscription is included as entity body of the request. The allowed data types for subscriptions are defined in clauses 6.3.2 through 6.3.9 and in clause 6.3.11 and are as follows:
          CellChangeSubscription
          RabEstSubscription
          RabModSubscription
          RabRelSubscription
          MeasRepUeSubscription
          NrMeasRepUeSubscription
          MeasTaSubscription
          CaReconfSubscription
          S1BearerSubscription.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionsPOST_request"
          description: |-
            Upon success, a response body containing data type describing the updated subscription is returned. The allowed data types for subscriptions are defined in clauses 6.3.2 through 6.3.9 and in clause 6.3.11 and are as follows:
            CellChangeSubscription
            RabEstSubscription
            RabModSubscription
            RabRelSubscription
            MeasRepUeSubscription
            NrMeasRepUeSubscription
            MeasTaSubscription
            CaReconfSubscription
            S1BearerSubscription.
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "406":
          $ref: "#/components/responses/406"
        "412":
          $ref: "#/components/responses/412"
        "422":
          $ref: "#/components/responses/422"
        "429":
          $ref: "#/components/responses/429"
      summary: Modify existing subscription by sending a new data structure.
      tags:
      - subscriptions
      x-openapi-router-controller: openapi_server.controllers.subscriptions_controller
components:
  parameters:
    Query.App_ins_id:
      description: Comma separated list of application instance identifiers.
      explode: true
      in: query
      name: app_ins_id
      required: false
      schema:
        type: string
      style: form
      x-exportParamName: Query.App_ins_id
    Query.Cell_id:
      description: Comma separated list of E-UTRAN Cell Identities.
      explode: true
      in: query
      name: cell_id
      required: false
      schema:
        $ref: "#/components/schemas/CellId"
      style: form
      x-exportParamName: Query.Cell_id
    Query.Ue_ipv4_address:
      description: Comma separated list of IE IPv4 addresses as defined for the type
        for AssociateId in clause 6.5.4.
      explode: true
      in: query
      name: ue_ipv4_address
      required: false
      schema:
        items:
          type: string
        type: array
      style: form
      x-exportParamName: Query.Ue_ipv4_address
    Query.Ue_ipv6_address:
      description: Comma separated list of IE IPv6 addresses as defined for the type
        for AssociateId in clause 6.5.4.
      explode: true
      in: query
      name: ue_ipv6_address
      required: false
      schema:
        items:
          type: string
        type: array
      style: form
      x-exportParamName: Query.Ue_ipv6_address
    Query.Nated_ip_address:
      description: Comma separated list of NATed IP addresses as defined for the type
        for AssociateId in clause 6.5.4.
      explode: true
      in: query
      name: nated_ip_address
      required: false
      schema:
        items:
          type: string
        type: array
      style: form
      x-exportParamName: Query.Nated_ip_address
    Query.Gtp_teid:
      description: Comma separated list of GTP TEID addresses as defined for the type
        for AssociateId in clause 6.5.4.
      explode: true
      in: query
      name: gtp_teid
      required: false
      schema:
        items:
          type: string
        type: array
      style: form
      x-exportParamName: Query.Gtp_teid
    Query.Erab_id:
      description: E-RAB identifier.
      explode: true
      in: query
      name: erab_id
      required: false
      schema:
        type: integer
      style: form
      x-exportParamName: Query.Erab_id
    Query.Qci:
      description: "QoS Class Identifier as defined in ETSI TS 123 401 [i.4]."
      explode: true
      in: query
      name: qci
      required: false
      schema:
        type: integer
      style: form
      x-exportParamName: Query.Qci
    Query.Erab_mbr_dl:
      description: "Maximum downlink E-RAB Bit Rate as defined in ETSI TS\_123\_401\
        \ [i.4]."
      explode: true
      in: query
      name: erab_mbr_dl
      required: false
      schema:
        type: integer
      style: form
      x-exportParamName: Query.Erab_mbr_dl
    Query.Erab_mbr_ul:
      description: "Maximum uplink E-RAB Bit Rate as defined in ETSI TS\_123\_401\_\
        [i.4]."
      explode: true
      in: query
      name: erab_mbr_ul
      required: false
      schema:
        type: integer
      style: form
      x-exportParamName: Query.Erab_mbr_ul
    Query.Erab_gbr_dl:
      description: "Guaranteed downlink E-RAB Bit Rate as defined in ETSI TS\_123\_\
        401 [i.4]."
      explode: true
      in: query
      name: erab_gbr_dl
      required: false
      schema:
        type: integer
      style: form
      x-exportParamName: Query.Erab_gbr_dl
    Query.Erab_gbr_ul:
      description: "Guaranteed uplink E-RAB Bit Rate as defined in ETSI TS\_123\_\
        401 [i.4]."
      explode: true
      in: query
      name: erab_gbr_ul
      required: false
      schema:
        type: integer
      style: form
      x-exportParamName: Query.Erab_gbr_ul
    Query.App_ins_id1:
      description: Comma separated list of application instance identifiers.
      explode: true
      in: query
      name: app_ins_id
      required: true
      schema:
        items:
          type: string
        type: array
      style: form
      x-exportParamName: Query.App_ins_id1
    Query.Temp_ue_id:
      description: "Comma separated list of temporary identifiers allocated for the\
        \ specific UEs as defined in ETSI TS 136 413 [i.3]."
      explode: true
      in: query
      name: temp_ue_id
      required: false
      schema:
        items:
          type: string
        type: array
      style: form
      x-exportParamName: Query.Temp_ue_id
    Query.Erab_id1:
      description: Comma separated list of E-RAB identifiers.
      explode: true
      in: query
      name: erab_id
      required: false
      schema:
        items:
          type: integer
        type: array
      style: form
      x-exportParamName: Query.Erab_id1
    Query.Cell_id1:
      description: "Comma separated list of E-UTRAN Cell Identities each defined as\
        \ a bit string (size (28)), as defined in ETSI TS\_136\_413 [i.3]."
      explode: true
      in: query
      name: cell_id
      required: false
      schema:
        items:
          type: string
        type: array
      style: form
      x-exportParamName: Query.Cell_id1
    Query.Dl_gbr_prb_usage_cell:
      description: "It indicates the PRB usage for downlink GBR traffic, as defined\
        \ in ETSI TS 136 314 [i.11] and ETSI TS\_136\_423\_[i.12]."
      explode: true
      in: query
      name: dl_gbr_prb_usage_cell
      required: false
      schema:
        type: integer
      style: form
      x-exportParamName: Query.Dl_gbr_prb_usage_cell
    Query.Ul_gbr_prb_usage_cell:
      description: "It indicates (in percentage) the PRB usage for uplink GBR traffic,\
        \ as defined in ETSI TS 136 314 [i.11] and ETSI TS\_136\_423\_[i.12]."
      explode: true
      in: query
      name: ul_gbr_prb_usage_cell
      required: false
      schema:
        type: integer
      style: form
      x-exportParamName: Query.Ul_gbr_prb_usage_cell
    Query.Dl_nongbr_prb_usage_cell:
      description: "It indicates (in percentage) the PRB usage for downlink nonGBR\
        \ traffic, as defined in ETSI TS 136 314 [i.11] and ETSI TS 136 423 [i.12]."
      explode: true
      in: query
      name: dl_nongbr_prb_usage_cell
      required: false
      schema:
        type: integer
      style: form
      x-exportParamName: Query.Dl_nongbr_prb_usage_cell
    Query.Ul_nongbr_prb_usage_cell:
      description: "It indicates (in percentage) the PRB usage for uplink nonGBR traffic,\
        \ as defined in ETSI TS 136 314 [i.11] and ETSI TS\_136\_423 [i.12]."
      explode: true
      in: query
      name: ul_nongbr_prb_usage_cell
      required: false
      schema:
        type: integer
      style: form
      x-exportParamName: Query.Ul_nongbr_prb_usage_cell
    Query.Dl_total_prb_usage_cell:
      description: "It indicates (in percentage) the PRB usage for total downlink\
        \ traffic, as defined in ETSI TS 136 314 [i.11] and ETSI TS\_136\_423 [i.12]."
      explode: true
      in: query
      name: dl_total_prb_usage_cell
      required: false
      schema:
        type: integer
      style: form
      x-exportParamName: Query.Dl_total_prb_usage_cell
    Query.Ul_total_prb_usage_cell:
      description: "It indicates (in percentage) the PRB usage for total uplink traffic,\
        \ as defined in ETSI TS 136 314 [i.11] and \nETSI\_TS\_136\_423 [i.12]."
      explode: true
      in: query
      name: ul_total_prb_usage_cell
      required: false
      schema:
